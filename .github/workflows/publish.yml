# Publishes this n8n community node package to npm on every version tag push.
#
# Starting May 1 2026, n8n requires all community nodes to be published via
# GitHub Actions with npm provenance statements. This workflow satisfies that
# requirement.
#
# ─── ONE-TIME SETUP ────────────────────────────────────────────────────────────
#
# Option A — OIDC Trusted Publishing (recommended, no long-lived secrets):
# 1. Log in to npmjs.com → package settings for n8n-nodes-get-transcribe
# 2. Publish access → Trusted Publishers → Add a publisher
# 3. Select GitHub Actions and fill in:
#    Repository owner: get-transcribe
#    Repository name: n8n-nodes-get-transcribe
#    Workflow name: publish.yml
#    Environment: (leave blank)
# 4. Leave NPM_TOKEN unset in this repository.
#
# Option B — npm Automation Token (fallback):
# 1. npmjs.com → Access Tokens → Granular Access Token (read+write on this package)
# 2. GitHub → Settings → Secrets → Actions → NPM_TOKEN
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
# 1. Bump "version" in package.json and commit to main
# 2. Create and push a matching tag, e.g.:
#      git tag v0.2.3
#      git push origin v0.2.3
# 3. This workflow builds and publishes with npm provenance.

name: Publish

on:
  push:
    tags:
      # Matches v0.2.3, v1.0.0-rc.1, etc. (matches existing repo tags)
      - 'v*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required to mint an OIDC token for npm provenance attestation.
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish with provenance
        # prepublishOnly runs build + lint before publish.
        # Provenance is signed by GitHub OIDC (requires id-token: write).
        #
        # Option A (OIDC Trusted Publisher): leave NPM_TOKEN unset.
        # Option B (token): set NPM_TOKEN secret — written to .npmrc before publish.
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          fi
          npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
